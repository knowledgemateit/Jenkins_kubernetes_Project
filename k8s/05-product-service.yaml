# product-service: Deployment + NodePort Service. Same shape as user-service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: demo-app
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nc -z product-postgres 5432; do
                echo "waiting for product-postgres:5432";
                sleep 2;
              done
      containers:
        - name: product-service
          # PRODUCT_SERVICE_IMAGE_PLACEHOLDER is replaced by the Jenkinsfile.
          image: PRODUCT_SERVICE_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: product-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: product-db-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: product-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: demo-app
  labels:
    app: product-service
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30082
