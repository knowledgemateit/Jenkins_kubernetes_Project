# PostgreSQL for product-service. Same shape as 02-user-db.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: product-db-secret
  namespace: demo-app
type: Opaque
stringData:
  POSTGRES_DB: products
  POSTGRES_USER: productadmin
  POSTGRES_PASSWORD: changeme-product-pw
---
apiVersion: v1
kind: Service
metadata:
  name: product-postgres
  namespace: demo-app
  labels:
    app: product-postgres
spec:
  clusterIP: None
  selector:
    app: product-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: product-postgres
  namespace: demo-app
spec:
  serviceName: product-postgres
  replicas: 1
  selector:
    matchLabels:
      app: product-postgres
  template:
    metadata:
      labels:
        app: product-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: product-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "productadmin", "-d", "products"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "productadmin", "-d", "products"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
