spring.application.name=user-service
server.port=8080

# Datasource — values come from K8s env vars (loaded from Secret + Service DNS)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:users}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Lab convenience: let Hibernate create the table on first run.
# Production should use Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari retry — handles the case where Postgres pod isn't ready yet.
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=10000

# Minimal actuator exposure — only what K8s probes need.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
